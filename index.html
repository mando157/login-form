<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <!--* CSS Style Sheets  -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-popup" id="login-popup">
        <lord-icon src="https://cdn.lordicon.com/yqgsjpsy.json" trigger="loop" delay="3000"
            style="width:100px;height:100px">
        </lord-icon>
        <div class="popup-content">
            <h2 class="popup-text">
                Login successful
            </h2>
            <button id="ok-button-l" onclick>Ok</button>
        </div>
    </div>

    <div class="signup-popup" id="signup-popup">
        <lord-icon src="https://cdn.lordicon.com/pxixoqxa.json" trigger="loop" delay="3000"
            style="width:100px;height:100px">
        </lord-icon>
        <div class="popup-content">
            <h2 class="popup-text">
                Account created
            </h2>
            <button id="ok-button-s" onclick>Ok</button>
        </div>
    </div>

    <section class="login">
        <div class="login-card">
            <div class="login-container">
                <h2>Login</h2>
                <form id="loginForm">
                    <div class="input-box">
                        <input type="email" id="loginEmail" required>
                        <label for="loginEmail">Email</label>
                    </div>
                    <div class="input-box">
                        <input type="password" id="loginPassword" required>
                        <label for="loginPassword">Password</label>
                    </div>
                    <p><a href="#" id="showSignup">Sign Up</a><a href="#">Forgot Password?</a></p>
                    <button type="submit">Login</button>
                </form>
            </div>

            <div class="signup-container">
                <h2>Sign Up</h2>
                <form id="signupForm">

                    <div class="input-box">
                        <input type="text" id="name" required>
                        <label for="name">Name</label>
                    </div>

                    <div class="input-box">
                        <input type="email" id="signupEmail" required>
                        <label for="signupEmail">Email</label>
                    </div>

                    <div class="input-box">
                        <input type="password" id="signupPassword" required>
                        <label for=signupPassword">create password</label>
                    </div>

                    <div class="sign-content">
                        <a href="#" id="showLogin">Login</a>
                        <div class="remember">
                            <input type="checkbox" id="checkbox">
                            <label for="checkbox">Remember me</label>
                        </div>
                    </div>
                    <button type="submit">Sign Up</button>
                </form>
            </div>

        </div>
        <div class="section-image">
            <img src="./images/logo-no-bg.png" alt="" class="login-image">
        </div>
    </section>

    <script src="script.js"></script>
    <script src="https://cdn.lordicon.com/lordicon.js"></script>

</body>

</html>
